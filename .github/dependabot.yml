version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    ignore:
      # typescript-eslint has no TypeScript 7 compatible release yet: its peer
      # dependency caps at "<6.1.0" (TS7 is the native compiler rewrite, which
      # changed the internal APIs typescript-estree relies on). Bumping to TS7
      # crashes the lint step. Hold at 6.x until upstream ships TS7 support.
      - dependency-name: "typescript"
        update-types: ["version-update:semver-major"]
    groups:
      all-dependencies:
        patterns:
          - "*"
    reviewers:
      - "weirdtangent"
    labels:
      - "dependencies"
    commit-message:
      prefix: "chore(deps)"
      include: "scope"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    groups:
      all-actions:
        patterns:
          - "*"
    reviewers:
      - "weirdtangent"
    labels:
      - "dependencies"
      - "github-actions"
    commit-message:
      prefix: "chore(ci)"
      include: "scope"
